name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short
        env:
          PYTHONPATH: src

      - name: Verify importability
        run: |
          python -c "from alphaforge.monte_carlo import run_monte_carlo; print('monte_carlo OK')"
          python -c "from alphaforge.strategy_reviewer import review_strategy; print('strategy_reviewer OK')"
          python -c "from alphaforge.bsc_adapter import get_bsc_ecosystem_signals; print('bsc_adapter OK')"
        env:
          PYTHONPATH: src
